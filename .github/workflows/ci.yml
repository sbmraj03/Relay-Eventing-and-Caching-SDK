name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:

  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  # ── 2. Unit Tests ────────────────────────────────────────────────────────────
  # Fast, no Docker required. These are the first gate — fail early.
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -v -count=1 -race ./internal/... ./sdk/...

  # ── 3. Integration Tests ─────────────────────────────────────────────────────
  # Spin up real Kafka + Redis via testcontainers. Docker is pre-installed on
  # GitHub Actions ubuntu-latest runners, so testcontainers works out of the box.
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        run: go test -v -count=1 -tags integration ./integration/
        timeout-minutes: 15

  # ── 4. E2E Functional Tests ──────────────────────────────────────────────────
  # Verify end-to-end business outcomes: notification decisions, cache state, DLQ.
  e2e:
    name: E2E Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run e2e functional tests
        run: go test -v -count=1 -tags e2e ./e2e/
        timeout-minutes: 15

  # ── 5. Build Docker Images ───────────────────────────────────────────────────
  # Verify both service Dockerfiles produce valid images. Images are NOT pushed
  # here; a separate release workflow (not shown) would handle that.
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [unit]      # skip expensive builds if unit tests fail
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build order-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/order-service/Dockerfile
          push: false
          tags: relay-order-service:ci

      - name: Build notification-consumer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-consumer/Dockerfile
          push: false
          tags: relay-notification-consumer:ci
